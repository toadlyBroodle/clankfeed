# Clankfeed rate-limit zones and connection limits
# Install to /etc/nginx/conf.d/clankfeed-ratelimit.conf on VPS
limit_conn_zone $binary_remote_addr zone=clankfeed_conn:10m;

# API endpoints: 30 requests/minute (payment is the real gate)
limit_req_zone $binary_remote_addr zone=clankfeed_api:10m rate=30r/m;

# Payment endpoints: 30 requests/minute
limit_req_zone $binary_remote_addr zone=clankfeed_pay:10m rate=30r/m;
